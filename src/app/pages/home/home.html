<header class="dashboard-header flex flex-col gap-3 p-4 sticky top-0 z-20 shadow-sm border-b border-primary/10 backdrop-blur-md bg-bgdark/90">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold leading-tight tracking-tight text-primary tracking-wide">WearWise</h1>
    <div class="weather-badge flex items-center gap-1 bg-white border border-accent/30 px-3 py-1.5 rounded-full shadow-sm text-textlight cursor-pointer">
      <span class="material-symbols-outlined text-xl text-accent">cloud</span>
      <p class="text-sm font-bold tracking-wide">18°C</p>
    </div>
  </div>
  <div class="flex items-center gap-3 fade-in-delay">
    <div class="profile-pic aspect-square bg-cover rounded-full h-10 w-10 shadow-sm border border-primary/20 flex items-center justify-center overflow-hidden cursor-pointer">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=100&auto=format&fit=crop" class="w-full h-full object-cover" alt="Profile">
    </div>
    <p class="text-lg font-medium text-textlight">Good Morning, Alex</p>
  </div>
</header>

<main class="flex flex-col gap-6 p-4 fade-in">
  <section>
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-bold text-primary">Today's Pick</h2>
      <button class="text-primary text-sm font-bold hover:text-accent transition-colors">See options</button>
    </div>
    
    <div class="outfit-card bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col border border-primary/10 cursor-pointer relative">
      
      <div class="w-full h-56 bg-gray-100 flex items-center justify-center relative overflow-hidden group">
         <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Outfit">
         <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
      </div>
      
      <div class="p-5 flex flex-col gap-3 relative bg-white z-10">
        <div class="flex justify-between items-start">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="ai-pulse h-2.5 w-2.5 rounded-full bg-accent"></span>
              <p class="text-primary text-xs font-black uppercase tracking-widest">AI Recommended</p>
            </div>
            <h3 class="text-2xl font-bold leading-tight text-textlight">Casual Friday</h3>
          </div>
          <button class="favorite-btn bg-bgdark text-primary p-2.5 rounded-full hover:bg-primary hover:text-white border border-primary/20 transition-all duration-300">
            <span class="material-symbols-outlined text-xl">favorite</span>
          </button>
        </div>
        
        <div class="insight-box p-3.5 rounded-xl mt-1 flex items-start gap-3 border border-accent/20">
          <span class="material-symbols-outlined text-accent shrink-0 mt-0.5">tips_and_updates</span>
          <div>
            <p class="text-sm font-bold text-primary mb-1">Why it works today</p>
            <p class="text-sm text-textlight/80 leading-relaxed font-medium">Perfect for 18°C and partly cloudy weather. A breathable linen shirt paired with classic denim for comfort and style.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
